<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  background: #000;
  color: #00ffcc;
  font-family: monospace;
  margin: 0;
  padding: 20px;
}

.station {
  margin-bottom: 30px;
  border-bottom: 1px solid #444;
  padding-bottom: 15px;
}

.title {
  font-size: 32px;
  color: #ffffff;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="data">Lade Wetterdaten...</div>

<script>

const stations = ["EDDH","EDHL","EDHK","ETNH"];

function loadData() {

  let html = "";

  for (let id of stations) {

    let url = `https://aviationweather.gov/data/metar/?ids=${id}&format=raw&taf=1`;

    html += `
      <div class="station">
        <div class="title">${id}</div>

        <div style="overflow:hidden; height:160px;">
  <iframe src="${url}" 
    style="width:100%; height:700px; border:none; margin-top:-300px;">
  </iframe>
</div>

      </div>
    `;
  }

  document.getElementById("data").innerHTML = html;
}

loadData();

</script>

</body>
</html>
