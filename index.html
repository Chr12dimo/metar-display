<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: black;
}

/* Sichtfenster */
.wrapper {
  overflow: hidden;
  height: 300px;
}

/* iframe anpassen */
iframe {
  width: 100%;
  height: 1000px;
  border: none;
  margin-top: -260px; /* <- WICHTIG: schneidet Menü komplett weg */
  filter: invert(1) hue-rotate(180deg); /* macht Hintergrund dunkel */
}
</style>
</head>

<body>

<div class="wrapper">
  <iframe src="https://aviationweather.gov/data/metar/?ids=EDDH%2CEDHL%2CEDHK%2CETNH&format=raw"></iframe>
</div>

</body>
</html>
