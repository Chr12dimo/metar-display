<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  background: #000;
  color: #00ffcc;
  font-family: monospace;
  margin: 0;
  padding: 10px;
}

.metar {
  font-size: 24px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="data">Lade METAR...</div>

<script>

const stations = ["EDDH","EDHL","EDHK","ETNH"];

async function loadData() {

  let output = "";

  for (let id of stations) {

    try {
      let response = await fetch(
        `https://aviationweather.gov/data/metar/?ids=${id}&format=raw`
      );

      let text = await response.text();

      let metarMatch = text.match(/METAR.*/);
      let metar = metarMatch ? metarMatch[0] : "Keine Daten";

      output += `<div class="metar">${metar}</div>`;

    } catch (e) {
      output += `<div class="metar">Fehler ${id}</div>`;
    }
  }

  document.getElementById("data").innerHTML = output;
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
