<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  background: #000;
  margin: 0;
  padding: 10px;
  font-family: monospace;
}

.block {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="data"></div>

<script>

const stations = ["EDDH","EDHL","EDHK","ETNH"];

function loadData() {

  let html = "";

  for (let id of stations) {

    let url = `https://aviationweather.gov/data/metar/?ids=${id}&format=raw`;

    html += `
      <div class="block">
        <div style="overflow:hidden; height:40px;">
  <iframe src="${url}" 
    style="width:100%; height:200px; border:none; margin-top:-85px;">
  </iframe>
</div>
      </div>
    `;
  }

  document.getElementById("data").innerHTML = html;
}

loadData();

</script>

</body>
</html>
