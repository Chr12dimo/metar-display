<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  background: #000;
  color: #00ffcc;
  font-family: monospace;
  margin: 0;
  padding: 20px;
}

.block {
  margin-bottom: 25px;
  border-bottom: 1px solid #333;
  padding-bottom: 15px;
}

.metar {
  color: #00ffcc;
  font-size: 20px;
}

.taf {
  color: #cccccc;
  font-size: 18px;
  white-space: pre-line;
  margin-top: 8px;
}
</style>
</head>

<body>

<div id="data">Lade Wetterdaten...</div>

<script>

const stations = ["EDDH","EDHL","EDHK","ETNH"];

async function loadData() {

  let output = "";

  for (let id of stations) {

    try {
      let response = await fetch(
        `https://aviationweather.gov/data/metar/?ids=${id}&format=raw&taf=1`
      );

      let text = await response.text();

      // METAR + TAF trennen
      let metarMatch = text.match(/METAR.*?(?=TAF|$)/s);
      let tafMatch = text.match(/TAF[\s\S]*/);

      let metar = metarMatch ? metarMatch[0] : "";
      let taf = tafMatch ? tafMatch[0] : "";

      output += `
        <div class="block">
          <div class="metar">${metar}</div>
          <div class="taf">${taf}</div>
        </div>
      `;

    } catch (e) {
      output += `<div class="block">Fehler bei ${id}</div>`;
    }
  }

  document.getElementById("data").innerHTML = output;
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
